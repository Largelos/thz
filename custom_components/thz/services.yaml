refresh_block:
  name: Refresh Block
  description: >
    Force an immediate re-read of a specific data block from the heat pump
    and push the updated values to all associated entities.
    Useful after writing a value when you want HA to reflect the device state
    without waiting for the next poll interval.
  fields:
    block:
      name: Block
      description: >
        Block to refresh. Accepts any form: "FB", "pxxFB", "0xFB".
        Examples: "FB" (temperatures & status), "F3" (DHW), "F4" (heating circuit),
        "F2" (heat request), "0A0176" (operating status & ventilation).
      required: true
      example: "FB"
      selector:
        text:
    entry_id:
      name: Entry ID
      description: Config entry ID. Only required when multiple THZ devices are configured.
      required: false
      selector:
        text:

set_diverter_valve:
  name: Set Diverter Valve
  description: >
    Move the 3-way diverter valve motor toward a position.
    The motor does NOT auto-stop — you must send position "off" once the valve
    has reached the target position.
    Both "heating" and "dhw" are guarded by the diverterValve bit in pxxF2:
    movement is only allowed in the direction the heat pump is already pressurising.
    After 3 seconds the motor is automatically stopped on both directions.
    "off" is always allowed and stops the motor immediately without waiting.
  fields:
    position:
      name: Position
      description: >
        Target position for the valve motor.
        "heating" — run motor toward heating circuit. Refused if DHW is active.
        "dhw"     — run motor toward DHW (warm water). Refused if heating is active.
        "off"     — stop motor on both directions. Always allowed.
      required: true
      example: "dhw"
      selector:
        select:
          options:
            - "heating"
            - "dhw"
            - "off"
    entry_id:
      name: Entry ID
      description: Config entry ID. Only required when multiple THZ devices are configured.
      required: false
      selector:
        text:

read_raw_register:
  name: Read Raw Register
  description: >
    Read a raw register/block from the heatpump and return the hex dump.
    Useful for debugging and verifying register contents.
  fields:
    command:
      name: Command
      description: >
        Hex command string to send to the heatpump.
        Examples: "FB" (sGlobal), "F2" (sControl), "0A0176" (sDisplay),
        "FC" (sTimedate), "FD" (sFirmware), "FE" (sFirmware-Id)
      required: true
      example: "FB"
      selector:
        text:
